name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI and dependencies
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Stage web assets
        run: |
          mkdir -p www
          cp index.html app.js styles.css manifest.json service-worker.js www/
          cp -r icons www/
          cp -r screens www/

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Build Android App
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: app-debug.apk
          path: src/android/app/build/outputs/apk/debug/app-debug.apk
