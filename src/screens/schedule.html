<section class="screen" data-screen="schedule" aria-label="Schedule screen">
  <h1>Schedule</h1>

  <div class="schedule-tabs-container">
    <div class="schedule-tabs">
      <button class="schedule-tab active" data-period="today">Today</button>
      <button class="schedule-tab" data-period="tomorrow">Tomorrow</button>
      <button class="schedule-tab" data-period="week">Week</button>
    </div>
  </div>

  <div class="schedule-container">
    <!-- Today's Schedule -->
    <div class="schedule-view active" data-period="today">
      <h2 id="today-date">Loading...</h2>
      <div class="schedule-items" id="today-schedule">
        <p class="loading">Loading today's schedule...</p>
      </div>
    </div>

    <!-- Tomorrow's Schedule -->
    <div class="schedule-view" data-period="tomorrow">
      <h2 id="tomorrow-date">Loading...</h2>
      <div class="schedule-items" id="tomorrow-schedule">
        <p class="loading">Loading tom     's schedule...</p>
      </div>
    </div>

    <!-- Week View -->
    <div class="schedule-view" data-period="week">
      <h2 id="week-date">Loading...</h2>
      <div class="week-grid" id="week-schedule">
        <p class="loading">Loading week's schedule...</p>
      </div>
    </div>
  </div>
</section>
